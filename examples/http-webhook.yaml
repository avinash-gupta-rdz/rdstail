# Webhook-only config: single postgres instance → HTTP webhook with gzip.
# Useful as a smoke-test target for SIEM / log ingestion backends that accept
# batched JSON.
sources:
  - type: rds
    engine: postgres
    region: ap-south-1
    instances:
      - prod-pg-writer

sinks:
  - name: siem
    type: http
    http:
      url: https://ingest.example.com/v1/rds-logs
      headers:
        Authorization: Bearer ${SIEM_TOKEN}
        X-Source: rdstail
      gzip: true
      timeout: 30s
    retry:
      max_attempts: 8
      initial_wait: 1s
      max_wait: 60s
      multiplier: 2.0

state:
  type: sqlite
  path: ./state.db

runtime:
  poll_interval: 10s
  max_workers: 2
  shutdown_timeout: 30s
  start_from: end

metrics:
  enabled: true
  listen: :9090

logging:
  level: info
