# Example config for rdstail. Adjust regions/instances/bucket to taste.
sources:
  - type: rds
    engine: postgres
    region: ap-south-1
    instances:
      - db-1
      - db-2

  - type: rds
    engine: mysql
    region: ap-south-1
    instances:
      - db-mysql-1

sinks:
  - name: s3-primary
    type: s3
    s3:
      bucket: my-log-bucket
      region: ap-south-1
      prefix: rds/
      max_bytes: 5242880      # 5 MiB
      max_records: 10000
      max_age: 30s
    retry:
      max_attempts: 10
      initial_wait: 500ms
      max_wait: 60s
      multiplier: 2.0

  - name: webhook-dev
    type: http
    http:
      url: https://logs.example.com/ingest
      headers:
        Authorization: Bearer ${LOGS_TOKEN}
      gzip: true
      timeout: 30s

state:
  type: sqlite        # sqlite | file
  path: ./state.db

runtime:
  poll_interval: 10s
  max_workers: 5                 # global sink-write pool
  max_instances_concurrent: 0    # 0 = use len(instances)
  shutdown_timeout: 30s
  start_from: end                # end | beginning
  memory_budget_bytes: 268435456 # 256 MiB

metrics:
  enabled: true
  listen: :9090

logging:
  level: info
